server:
  port: 8083

spring:
  application:
    name: transfer-service
  datasource:
    url: jdbc:mysql://localhost:3306/payflow_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: payflow_user
    password: payflow_pass
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect

jwt:
  secret: payflow-super-secret-key-that-is-at-least-64-characters-long-for-hs512

services:
  wallet-url: http://localhost:8082
  transaction-url: http://localhost:8084

management:
  endpoints:
    web:
      exposure:
        include: health,info
aws:
  sqs:
    queue-url: https://sqs.us-east-1.amazonaws.com/150506369517/payflow-transfers
