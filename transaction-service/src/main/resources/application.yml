server:
  port: 8084

spring:
  application:
    name: transaction-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/payflow_transactions}
      database: payflow_transactions

jwt:
  secret: ${JWT_SECRET:payflow-super-secret-key-that-is-at-least-64-characters-long-for-hs512}

management:
  endpoints:
    web:
      exposure:
        include: health,info
