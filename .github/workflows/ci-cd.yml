name: PayFlow CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ECS_CLUSTER: payflow-cluster

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn test -pl transfer-service -q

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: transfer-service/target/surefire-reports/

  build-and-push:
    name: Build & Push ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      matrix:
        service:
          - name: auth-service
          - name: wallet-service
          - name: transfer-service
          - name: transaction-service
          - name: notification-service
          - name: api-gateway

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build JAR
        run: mvn clean package -DskipTests -pl ${{ matrix.service.name }} -q

      - name: Build & Push Docker image
        run: |
          IMAGE=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/payflow/${{ matrix.service.name }}:${{ github.sha }}
          IMAGE_LATEST=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/payflow/${{ matrix.service.name }}:latest
          docker build -t $IMAGE -t $IMAGE_LATEST ${{ matrix.service.name }}/
          docker push $IMAGE
          docker push $IMAGE_LATEST

  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Frontend
        run: |
          IMAGE=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/payflow/frontend:${{ github.sha }}
          IMAGE_LATEST=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/payflow/frontend:latest
          docker build -t $IMAGE -t $IMAGE_LATEST frontend/
          docker push $IMAGE
          docker push $IMAGE_LATEST

  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: [build-and-push, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy all services
        run: |
          declare -A SERVICE_MAP=(
            [payflow-auth-service]="auth-service"
            [payflow-wallet-service]="wallet-service"
            [payflow-transfer-service]="transfer-service"
            [payflow-transaction-service]="transaction-service"
            [payflow-notification-service]="notification-service"
            [payflow-api-gateway]="api-gateway"
            [payflow-frontend]="frontend"
          )

          for SERVICE in "${!SERVICE_MAP[@]}"; do
            CONTAINER=${SERVICE_MAP[$SERVICE]}
            IMAGE=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/payflow/${CONTAINER}:${{ github.sha }}
            echo "🚀 Registrando nueva task def para $SERVICE con imagen $IMAGE..."

            # Obtener task def actual
            TASK_DEF=$(aws ecs describe-task-definition \
              --task-definition $SERVICE \
              --region us-east-1 \
              --query 'taskDefinition' \
              --output json)

            # Registrar nueva revisión con imagen del SHA actual
            NEW_TASK_DEF=$(echo $TASK_DEF | python3 -c "
import json, sys
td = json.load(sys.stdin)
td['containerDefinitions'][0]['image'] = '$IMAGE'
for key in ['taskDefinitionArn','revision','status','requiresAttributes',
            'compatibilities','registeredAt','registeredBy']:
    td.pop(key, None)
print(json.dumps(td))
")
            REVISION=$(aws ecs register-task-definition \
              --cli-input-json "$NEW_TASK_DEF" \
              --region us-east-1 \
              --query 'taskDefinition.revision' \
              --output text)

            echo "✅ Task def registrada: $SERVICE:$REVISION"

            # Deploy con nueva revisión
            aws ecs update-service \
              --cluster payflow-cluster \
              --service $SERVICE \
              --task-definition $SERVICE:$REVISION \
              --region us-east-1 \
              --query 'service.{Name:serviceName,TaskDef:taskDefinition}' \
              --output table
          done

      - name: Wait for services stable
        run: |
          for SERVICE in payflow-auth-service payflow-wallet-service \
                         payflow-transfer-service payflow-api-gateway; do
            echo "⏳ Waiting for $SERVICE..."
            for i in $(seq 1 20); do
              RUNNING=$(aws ecs describe-services \
                --cluster payflow-cluster \
                --services $SERVICE \
                --region us-east-1 \
                --query 'services[0].runningCount' \
                --output text)
              if [ "$RUNNING" = "1" ]; then
                echo "✅ $SERVICE stable (running=$RUNNING)"
                break
              fi
              echo "  attempt $i/20 — running=$RUNNING, waiting 15s..."
              sleep 15
            done
          done

      - name: Smoke test via ALB
        run: |
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            -X POST \
            -H "Content-Type: application/json" \
            -d '{}' \
            https://payflow.intellenz.com/api/auth/register)

          if [ "$STATUS" = "400" ] || [ "$STATUS" = "200" ]; then
            echo "✅ Smoke test passed via ALB"
          else
            echo "❌ Smoke test failed: HTTP $STATUS"
            exit 1
          fi
