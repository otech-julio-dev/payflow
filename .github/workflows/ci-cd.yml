name: PayFlow CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ECS_CLUSTER: payflow-cluster

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn test -pl transfer-service -q

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: transfer-service/target/surefire-reports/

  build-and-push:
    name: Build & Push ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      matrix:
        service:
          - name: auth-service
          - name: wallet-service
          - name: transfer-service
          - name: transaction-service
          - name: notification-service
          - name: api-gateway

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build JAR
        run: mvn clean package -DskipTests -pl ${{ matrix.service.name }} -q

      - name: Build & Push Docker image
        run: |
          IMAGE=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/payflow/${{ matrix.service.name }}:${{ github.sha }}
          IMAGE_LATEST=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/payflow/${{ matrix.service.name }}:latest
          docker build -t $IMAGE -t $IMAGE_LATEST ${{ matrix.service.name }}/
          docker push $IMAGE
          docker push $IMAGE_LATEST

  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Frontend
        run: |
          IMAGE=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/payflow/frontend:${{ github.sha }}
          IMAGE_LATEST=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/payflow/frontend:latest
          docker build -t $IMAGE -t $IMAGE_LATEST frontend/
          docker push $IMAGE
          docker push $IMAGE_LATEST

  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: [build-and-push, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy all services
        run: |
          for SERVICE in payflow-auth-service payflow-wallet-service payflow-transfer-service \
                         payflow-transaction-service payflow-notification-service \
                         payflow-api-gateway payflow-frontend; do
            echo "🚀 Deploying $SERVICE..."
            aws ecs update-service \
              --cluster payflow-cluster \
              --service $SERVICE \
              --force-new-deployment \
              --region us-east-1 \
              --query 'service.{Name:serviceName,Status:status}' \
              --output table
          done

      - name: Wait for services stable
        run: |
          for SERVICE in payflow-auth-service payflow-wallet-service \
                         payflow-transfer-service payflow-api-gateway; do
            echo "⏳ Waiting for $SERVICE..."
            aws ecs wait services-stable \
              --cluster payflow-cluster \
              --services $SERVICE \
              --region us-east-1
            echo "✅ $SERVICE stable"
          done

      - name: Get Gateway IP and smoke test
        run: |
          TASK=$(aws ecs list-tasks \
            --cluster payflow-cluster \
            --service-name payflow-api-gateway \
            --region us-east-1 \
            --query 'taskArns[0]' --output text)

          ENI=$(aws ecs describe-tasks \
            --cluster payflow-cluster \
            --tasks $TASK \
            --region us-east-1 \
            --query 'tasks[0].attachments[0].details[?name==`networkInterfaceId`].value' \
            --output text)

          IP=$(aws ec2 describe-network-interfaces \
            --network-interface-ids $ENI \
            --query 'NetworkInterfaces[0].Association.PublicIp' \
            --output text --region us-east-1)

          echo "🌐 Gateway IP: $IP"

          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            --max-time 30 \
            http://$IP:8080/actuator/health)

          if [ "$STATUS" = "200" ]; then
            echo "✅ Smoke test passed — $IP:8080"
          else
            echo "❌ Smoke test failed: HTTP $STATUS"
            exit 1
          fi
