name: PayFlow CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
  ECS_CLUSTER: payflow-cluster

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Tests
  # ─────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn test -pl transfer-service -q

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: transfer-service/target/surefire-reports/

  # ─────────────────────────────────────────
  # JOB 2: Build & Push ECR (solo en main)
  # ─────────────────────────────────────────
  build-and-push:
    name: Build & Push ECR
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    strategy:
      matrix:
        service:
          - name: auth-service
            port: 8081
          - name: wallet-service
            port: 8082
          - name: transfer-service
            port: 8083
          - name: transaction-service
            port: 8084
          - name: notification-service
            port: 8085
          - name: api-gateway
            port: 8080

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build JAR
        run: mvn clean package -DskipTests -pl ${{ matrix.service.name }} -q

      - name: Build & Push Docker image
        run: |
          IMAGE=$ECR_REGISTRY/payflow/${{ matrix.service.name }}:${{ github.sha }}
          IMAGE_LATEST=$ECR_REGISTRY/payflow/${{ matrix.service.name }}:latest
          docker build -t $IMAGE -t $IMAGE_LATEST ${{ matrix.service.name }}/
          docker push $IMAGE
          docker push $IMAGE_LATEST
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV

  # ─────────────────────────────────────────
  # JOB 3: Build & Push Frontend
  # ─────────────────────────────────────────
  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Frontend
        run: |
          IMAGE=$ECR_REGISTRY/payflow/frontend:${{ github.sha }}
          IMAGE_LATEST=$ECR_REGISTRY/payflow/frontend:latest
          docker build -t $IMAGE -t $IMAGE_LATEST frontend/
          docker push $IMAGE
          docker push $IMAGE_LATEST

  # ─────────────────────────────────────────
  # JOB 4: Deploy ECS
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: [build-and-push, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy all services
        run: |
          SERVICES=(
            payflow-auth-service
            payflow-wallet-service
            payflow-transfer-service
            payflow-transaction-service
            payflow-notification-service
            payflow-api-gateway
            payflow-frontend
          )
          for SERVICE in "${SERVICES[@]}"; do
            echo "🚀 Deploying $SERVICE..."
            aws ecs update-service \
              --cluster $ECS_CLUSTER \
              --service $SERVICE \
              --force-new-deployment \
              --region $AWS_REGION \
              --query 'service.{Name:serviceName,Status:status}' \
              --output table
          done

      - name: Wait for services stable
        run: |
          SERVICES=(
            payflow-auth-service
            payflow-wallet-service
            payflow-transfer-service
            payflow-api-gateway
          )
          for SERVICE in "${SERVICES[@]}"; do
            echo "⏳ Waiting for $SERVICE..."
            aws ecs wait services-stable \
              --cluster $ECS_CLUSTER \
              --services $SERVICE \
              --region $AWS_REGION
            echo "✅ $SERVICE stable"
          done

      - name: Smoke test
        run: |
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            http://98.94.14.32:8080/actuator/health)
          if [ "$STATUS" = "200" ]; then
            echo "✅ API Gateway health check passed"
          else
            echo "❌ Health check failed: $STATUS"
            exit 1
          fi
