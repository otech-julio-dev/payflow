server:
  port: 8082

spring:
  application:
    name: wallet-service
  datasource:
    url: jdbc:mysql://localhost:3306/payflow_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: payflow_user
    password: payflow_pass
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

jwt:
  secret: payflow-super-secret-key-that-is-at-least-64-characters-long-for-hs512

management:
  endpoints:
    web:
      exposure:
        include: health,info
