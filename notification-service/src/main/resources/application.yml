server:
  port: 8085

spring:
  application:
    name: notification-service

aws:
  region: ${AWS_REGION:us-east-1}
  sqs:
    queue-url: ${SQS_QUEUE_URL:https://sqs.us-east-1.amazonaws.com/150506369517/payflow-transfers}
  sns:
    topic-arn: ${SNS_TOPIC_ARN:arn:aws:sns:us-east-1:150506369517:payflow-notifications}

management:
  endpoints:
    web:
      exposure:
        include: health,info
