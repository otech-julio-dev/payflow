server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-public
              uri: http://localhost:8081
              predicates:
                - Path=/api/auth/register,/api/auth/login,/api/auth/refresh
              filters:
                - StripPrefix=0

            - id: auth-protected
              uri: http://localhost:8081
              predicates:
                - Path=/api/auth/**
              filters:
                - StripPrefix=0
                - JwtAuth

            - id: wallet-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/wallets/**
              filters:
                - StripPrefix=0
                - JwtAuth

            - id: transfer-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/transfers/**
              filters:
                - StripPrefix=0
                - JwtAuth

            - id: transaction-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/transactions/**
              filters:
                - StripPrefix=0
                - JwtAuth

          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:5173"
                  - "http://localhost:3000"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders:
                  - "*"
                allowCredentials: true

jwt:
  secret: payflow-super-secret-key-that-is-at-least-64-characters-long-for-hs512

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
