server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:5173"
                  - "http://localhost:3000"
                  - "https://payflow.intellenz.com"
                  - "http://payflow.intellenz.com"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                exposedHeaders: "*"
                allowCredentials: true
                maxAge: 3600
      routes:
        - id: auth-service
          uri: http://auth.payflow.internal:8081
          predicates:
            - Path=/api/auth/**

        - id: wallet-service
          uri: http://wallet.payflow.internal:8082
          predicates:
            - Path=/api/wallets/**
          filters:
            - JwtAuth

        - id: transfer-service
          uri: http://transfer.payflow.internal:8083
          predicates:
            - Path=/api/transfers/**
          filters:
            - JwtAuth

        - id: transaction-service
          uri: http://transaction.payflow.internal:8084
          predicates:
            - Path=/api/transactions/**
          filters:
            - JwtAuth

jwt:
  secret: ${JWT_SECRET:payflow-super-secret-key-that-is-at-least-64-characters-long-for-hs512}

management:
  endpoints:
    web:
      exposure:
        include: health,info
