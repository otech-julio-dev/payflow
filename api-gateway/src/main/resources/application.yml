server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: auth-service
              uri: ${AUTH_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/api/auth/**
              filters:
                - StripPrefix=0

            - id: wallet-service
              uri: ${WALLET_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/api/wallets/**
              filters:
                - StripPrefix=0
                - JwtAuth

            - id: transfer-service
              uri: ${TRANSFER_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/api/transfers/**
              filters:
                - StripPrefix=0
                - JwtAuth

            - id: transaction-service
              uri: ${TRANSACTION_SERVICE_URL:http://localhost:8084}
              predicates:
                - Path=/api/transactions/**
              filters:
                - StripPrefix=0
                - JwtAuth

            - id: notification-service
              uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8085}
              predicates:
                - Path=/api/notifications/**
              filters:
                - StripPrefix=0

          globalcors:
            corsConfigurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:5173"
                  - "http://localhost:3000"
                  - ${FRONTEND_URL:http://localhost:5173}
                allowedMethods: "*"
                allowedHeaders: "*"
                allowCredentials: true

jwt:
  secret: ${JWT_SECRET:payflow-super-secret-key-that-is-at-least-64-characters-long-for-hs512}

management:
  endpoints:
    web:
      exposure:
        include: health,info
