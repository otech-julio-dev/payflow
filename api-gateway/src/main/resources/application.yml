server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - "http://localhost:5173"
                  - "http://localhost:3000"
                  - "https://payflow.intellenz.com"
                  - "http://payflow.intellenz.com"
                allowedMethods: "*"
                allowedHeaders: "*"
                allowCredentials: true

jwt:
  secret: ${JWT_SECRET:payflow-super-secret-key-that-is-at-least-64-characters-long-for-hs512}

management:
  endpoints:
    web:
      exposure:
        include: health,info
